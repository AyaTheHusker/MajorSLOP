<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MajorSLOP!</title>
    <link rel="stylesheet" href="/static/css/main.css?v=7">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.css">
</head>
<body>
    <!-- Full-viewport room canvas (background) -->
    <canvas id="room-canvas"></canvas>

    <!-- Scanline overlay -->
    <div id="scanline-overlay" style="display:none"></div>

    <!-- Combat effects overlay -->
    <div id="combat-effects"></div>

    <!-- Top bar: menu + room name + HP bars -->
    <header id="header">
        <div class="header-left">
            <div id="menu-bar"></div>
            <span id="room-name">Not Connected</span>
            <span id="room-location" style="color:#888;font-size:0.85em;margin-left:8px;"></span>
            <span id="connection-status" class="status-dot disconnected"></span>
        </div>
        <div class="header-right">
            <div class="hp-bar-container">
                <label>HP</label>
                <div class="bar hp-bar"><div class="bar-fill" id="hp-fill"></div><span class="bar-text" id="hp-text">0/0</span></div>
            </div>
            <div class="hp-bar-container">
                <label>MA</label>
                <div class="bar mana-bar"><div class="bar-fill" id="mana-fill"></div><span class="bar-text" id="mana-text">0/0</span></div>
            </div>
            <button id="btn-char" onclick="charPanel.toggle()" title="Character & Inventory">Char</button>
            <button id="btn-chat" onclick="chatPanel.toggle()" title="Chat Window">Chat</button>
            <button id="btn-terminal" onclick="mudTerminal.toggle()" title="MUD Terminal (ANSI)">Terminal</button>
            <div class="ghost-box">
                <span class="ghost-icon" title="Ghost Character Remote">👻</span>
                <input id="ghost-input" type="text" placeholder="@where" spellcheck="false"
                       title="Send remote command via ghost character">
            </div>
            <button id="btn-connect" onclick="sendCommand('connect')">Connect</button>
            <button id="btn-disconnect" onclick="sendCommand('disconnect')">Disconnect</button>
        </div>
    </header>

    <!-- Entity thumbnails (overlaid on room view) -->
    <div id="entity-panel" class="floating">
        <div id="npc-thumbs" class="thumb-row npc-row"></div>
        <div id="player-thumbs" class="thumb-row player-row"></div>
        <div id="item-thumbs" class="thumb-row item-row"></div>
    </div>

    <!-- Side panel (overlaid, toggleable, hidden by default) -->
    <div id="side-panel" style="display:none">
        <!-- Room description -->
        <div id="room-desc-panel" class="panel">
            <div class="panel-header">Room</div>
            <div id="room-description" class="panel-body"></div>
            <div id="room-exits" class="exits"></div>
        </div>

        <!-- Combat / chat log -->
        <div id="log-panel" class="panel">
            <div class="panel-header">
                <span class="tab active" data-tab="combat">Combat</span>
                <span class="tab" data-tab="chat">Chat</span>
                <span class="tab" data-tab="all">All</span>
            </div>
            <div id="log-body" class="panel-body log-scroll"></div>
        </div>
    </div>

    <!-- xterm.js -->
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0/lib/addon-fit.min.js"></script>

    <!-- Scripts -->
    <script src="/static/js/coin_renderer.js?v=6"></script>
    <script src="/static/js/depth_parallax.js?v=6"></script>
    <script src="/static/js/room_view.js?v=6"></script>
    <script src="/static/js/combat_effects.js?v=6"></script>
    <script src="/static/js/view_menu.js?v=6"></script>
    <script src="/static/js/char_panel.js?v=6"></script>
    <script src="/static/js/chat_panel.js?v=6"></script>
    <script src="/static/js/mud_terminal.js?v=6"></script>
    <script src="/static/js/nav_panel.js?v=8"></script>
    <script src="/static/js/app.js?v=7"></script>
    <script>
        // Initialize
        const roomView = new RoomView(document.getElementById('room-canvas'));
        const combatFx = new CombatEffects(document.getElementById('combat-effects'));
        const viewMenu = new ViewMenu(roomView);
        const charPanel = new CharPanel();
        const chatPanel = new ChatPanel((cmd, data) => sendCommand(cmd, data));
        const mudTerminal = new MudTerminal(sendCommand);
        const navPanel = new NavPanel((cmd, data) => sendCommand(cmd, data));
        roomView.applyAllSettings();

        // Ghost character input
        const ghostInput = document.getElementById('ghost-input');
        const GHOST_NAME = localStorage.getItem('ghostName') || 'Yoder';
        ghostInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = ghostInput.value.trim();
                if (cmd) {
                    sendCommand('ghost', { name: GHOST_NAME, at_cmd: cmd });
                    ghostInput.value = '';
                }
            }
        });
    </script>
</body>
</html>
